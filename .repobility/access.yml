# Repobility access matrix — VanishDrop
# https://repobility.com/docs/access-matrix
#
# Authorization model: capability URL. Each file is reachable via:
#
#     https://host/d/<id>#k=<urlsafe-base64-key>
#
# - `id`  16 random bytes (~128-bit search space). Path-visible DB key.
# - `k`   32 random bytes (AES-GCM 256-bit key). In the URL fragment.
#         Browsers never send fragments in HTTP, so the server never
#         sees the key — even in its own logs.
#
# Possession of the full URL is the credential. There is no user table,
# no session, no role. Once a recipient downloads, the server copy is
# atomically destroyed (1-download default; up to 100 configurable).
#
# Documented for Repobility so the AUC003 / AUC008 findings can be tied
# to an explicit design choice rather than read as missing auth.

version: 1

roles:
  capability_holder:
    description: |
      Any client that possesses the file's URL. The URL contains both
      the path id (server-known) and the fragment key (server-blind).
      Without the fragment key the holder can fetch the ciphertext
      but cannot decrypt it.

endpoints:
  - method: GET
    path: /
    role: anonymous
    description: Static SPA shell (compose view).
    protection: none

  - method: GET
    path: /d/:file_id
    role: anonymous
    scope: capability_url
    owner: capability_holder
    tenant: none
    description: SPA shell for the viewer. The id is resolved client-side and the fragment key never reaches the server.
    protection: capability_url, regex_validate_id_client_side

  - method: GET
    path: /healthz
    role: anonymous
    description: Liveness probe; returns count of stored records, no content.
    protection: none

  - method: POST
    path: /api/files
    role: anonymous
    description: Submit a ciphertext blob + IV + filename + TTL + max-downloads. Returns an unguessable id.
    protection: regex_validate_payload, max_blob_size, max_ttl, max_downloads, filename_sanitize
    asserted_by: tests/test_server.py, tests/test_auth.py

  - method: GET
    path: /api/files/:file_id
    role: capability_holder
    scope: capability_url
    owner: capability_holder
    tenant: none
    description: Fetch the ciphertext + IV header. Atomically decrements the download counter; reaching zero deletes the record and unlinks the blob.
    protection: capability_url, atomic_download_consumption
    asserted_by: tests/test_auth.py (AUTH-02, AUTH-04)

  - method: GET
    path: /api/files/:file_id/meta
    role: capability_holder
    scope: capability_url
    owner: capability_holder
    tenant: none
    description: Non-consuming peek at filename, size, expiry, remaining downloads. Used by the viewer to render the confirm dialog before consuming.
    protection: capability_url
    asserted_by: tests/test_auth.py (AUTH-05)

non_goals:
  - No server-side user accounts, sessions, or password authentication.
  - No admin or super_admin role. The server has no privileged operations a client could be granted.
  - No DELETE, no edit, no list — the URL holder cannot retract or modify a file once posted (records die by being downloaded or expiring).
  - No persistent server-side decryption key. The server stores ciphertext blobs only.
  - No download receipts. The creator cannot learn whether their file was downloaded.

asserted_by:
  - tests/test_auth.py
  - tests/test_server.py

cwe_references:
  - CWE-285  # Improper Authorization — addressed via capability URL
  - CWE-359  # Exposure of Private Personal Information — keys never leave browser
  - CWE-345  # Insufficient Verification of Data Authenticity — AES-GCM authentication tag
  - CWE-330  # Use of Insufficiently Random Values — 16-byte ids and 32-byte keys from CSPRNG

owasp_references:
  - A01:2021  # Broken Access Control — mapped via endpoints table
  - A02:2021  # Cryptographic Failures — AES-GCM 256-bit
  - A04:2021  # Insecure Design — capability-URL is explicit, documented design
  - A07:2021  # Identification & Authentication — possession of URL is the credential
